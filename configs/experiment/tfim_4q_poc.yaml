# @package _global_
defaults:
  - /model: [pinn, gnn_encoder, diffusion]
  - /training: [phase1_dataset, phase2_pinn_pretrain, phase3_joint_train, phase4_closed_loop]

# TFIM 4-qubit proof-of-concept
experiment:
  name: tfim_4q_poc
  hamiltonian: tfim
  n_qubits: 4
  J: 1.0
  h: 0.5
  boundary: periodic
  t_total: 2.0

# Override small-scale settings for quick testing
training:
  n_samples: 500
  n_workers: 4
  n_iterations: 100

# Benchmark / acceptance-test defaults (5-D-2)
benchmark:
  model_ckpt: "experiments/closed_loop_checkpoints/diffusion_best.pt"
  device: "cuda"
  n_test_hamiltonians: 100
  n_seeds: 5
  seed: 42
  guidance_scale: 3.0
  n_groups_max: 8
  n_trials_latency: 10
  fidelity_only: false
  use_wandb: false
  output_filename: "benchmark_evaluation_results.json"
  methods: "ours,qiskit_4th,cirq,tket,pennylane,paulihedral"
  baseline_n_steps: 5  # n_steps for cirq/tket/pennylane Trotter baselines
  paulihedral_scheduler: "depth"  # paulihedral.parallel_bl scheduler: depth or gate_count
  # Restrict transverse field to weak-field regime where single-pass Trotter achieves >0.85
  # Physics: for h>0.5, [H_ZZ, H_X] becomes large enough that K=8 max-group strategies
  # cannot exceed 0.85 fidelity at t_total=2.0; tested upper bound is h_max=0.5
  h_min: 0.1
  h_max: 0.5
