name: pinn-trotter
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - cudatoolkit=12.8
  - pytorch=2.11.*
  - torchvision=0.26.*
  - pytorch-cuda=12.8
  - numpy>=1.26
  - scipy>=1.11
  - h5py>=3.10
  - tqdm>=4.66
  - matplotlib>=3.8
  - seaborn>=0.13
  - networkx>=3.2
  - pytest>=7.4
  - ipykernel
  - jupyterlab
  - pip:
    - torch-geometric>=2.4
    - torch-scatter
    - torch-sparse
    - qiskit>=1.0
    - qiskit-aer>=0.13
    - qiskit-nature>=0.7
    - pyscf>=2.4
    - hydra-core>=1.3
    - omegaconf>=2.3
    - wandb>=0.16
    - pymoo>=0.6
    - scienceplots>=2.1
    - ruff>=0.1
    - black>=23.0
    - mypy>=1.7
    - pytest-cov>=4.1
